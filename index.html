<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colección de camisetas</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0b0b0d;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.25rem;
      }

      h1 {
        margin: 0 0 1rem;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 0.75rem;
        margin-bottom: 0.85rem;
      }

      input,
      select {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 0.6rem 0.7rem;
        background: #141416;
        color: #fff;
      }

      .result-count {
        margin: 0 0 1rem;
        color: #cfd3dc;
      }

      .grid {
        display: grid;
        gap: 0.9rem;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .card {
        background: #151518;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        overflow: hidden;
      }

      .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        display: block;
      }

      .card-content {
        padding: 0.75rem;
      }

      .meta {
        margin: 0.2rem 0;
        color: #cfd3dc;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Colección de camisetas</h1>
      <section id="filters" class="filters" aria-label="Filtros de camisetas"></section>
      <p id="result-count" class="result-count">0 camisetas encontradas</p>
      <section id="cards-grid" class="grid" aria-live="polite"></section>
    </main>

    <script>
      const cards = [
        {
          id: "1",
          image: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=900&q=80",
          player: "Lionel Messi",
          team: "FC Barcelona",
          number: "10",
          championship: "LaLiga",
          title: "Champions League",
          status: "owned",
          season: "2010/11",
        },
        {
          id: "2",
          image: "https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?auto=format&fit=crop&w=900&q=80",
          player: "Kylian Mbappé",
          team: "Francia",
          number: "10",
          championship: "Mundial",
          title: "Copa del Mundo",
          status: "planned",
          season: "2018",
        },
        {
          id: "3",
          image: "https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=900&q=80",
          player: "Cristiano Ronaldo",
          team: "Real Madrid",
          number: "7",
          championship: "Champions League",
          title: "Balón de Oro",
          status: "owned",
          season: "2016/17",
        },
      ];

      const state = {
        filters: {
          query: "",
          status: "",
          player: "",
          team: "",
          number: "",
          championship: "",
          title: "",
        },
      };

      const filtersContainer = document.getElementById("filters");
      const cardsGrid = document.getElementById("cards-grid");
      const resultCount = document.getElementById("result-count");

      const uniqueOptions = (items, key) => [...new Set(items.map((item) => item[key]).filter(Boolean))].sort();

      const makeSelect = (id, label, options) => {
        const select = document.createElement("select");
        select.id = id;
        select.setAttribute("aria-label", label);
        select.innerHTML = `<option value="">${label}</option>${options
          .map((option) => `<option value="${option}">${option}</option>`)
          .join("")}`;
        return select;
      };

      const renderFilterControls = () => {
        filtersContainer.innerHTML = "";

        const searchInput = document.createElement("input");
        searchInput.type = "search";
        searchInput.id = "query-filter";
        searchInput.placeholder = "Buscar texto libre";
        searchInput.setAttribute("aria-label", "Buscar texto libre");
        filtersContainer.appendChild(searchInput);

        filtersContainer.appendChild(makeSelect("status-filter", "Estado", ["owned", "planned"]));
        filtersContainer.appendChild(makeSelect("player-filter", "Jugador", uniqueOptions(cards, "player")));
        filtersContainer.appendChild(makeSelect("team-filter", "Equipo/Selección", uniqueOptions(cards, "team")));
        filtersContainer.appendChild(makeSelect("number-filter", "Dorsal", uniqueOptions(cards, "number")));
        filtersContainer.appendChild(makeSelect("championship-filter", "Campeonato", uniqueOptions(cards, "championship")));
        filtersContainer.appendChild(makeSelect("title-filter", "Título", uniqueOptions(cards, "title")));

        const listeners = [
          ["query-filter", "query", "input"],
          ["status-filter", "status", "change"],
          ["player-filter", "player", "change"],
          ["team-filter", "team", "change"],
          ["number-filter", "number", "change"],
          ["championship-filter", "championship", "change"],
          ["title-filter", "title", "change"],
        ];

        listeners.forEach(([id, field, event]) => {
          document.getElementById(id).addEventListener(event, (e) => {
            state.filters[field] = e.target.value.trim();
            updateView();
          });
        });
      };

      const applyFilters = (allCards, filters) => {
        const query = filters.query.toLowerCase();

        return allCards.filter((card) => {
          const freeTextMatch =
            !query ||
            [card.player, card.team, card.number, card.championship, card.title, card.season]
              .join(" ")
              .toLowerCase()
              .includes(query);

          return (
            freeTextMatch &&
            (!filters.status || card.status === filters.status) &&
            (!filters.player || card.player === filters.player) &&
            (!filters.team || card.team === filters.team) &&
            (!filters.number || card.number === filters.number) &&
            (!filters.championship || card.championship === filters.championship) &&
            (!filters.title || card.title === filters.title)
          );
        });
      };

      const renderCards = (items) => {
        cardsGrid.innerHTML = items
          .map(
            (card) => `
            <article class="card">
              <img src="${card.image}" alt="Camiseta de ${card.player}" loading="lazy" />
              <div class="card-content">
                <strong>${card.player} - #${card.number}</strong>
                <p class="meta">${card.team} · ${card.season}</p>
                <p class="meta">Estado: ${card.status}</p>
                <p class="meta">Campeonato: ${card.championship}</p>
                <p class="meta">Título: ${card.title}</p>
              </div>
            </article>
          `
          )
          .join("");
      };

      const updateView = () => {
        const filtered = applyFilters(cards, state.filters);
        renderCards(filtered);
        resultCount.textContent = `${filtered.length} camisetas encontradas`;
      };

      renderFilterControls();
      updateView();
    </script>
  </body>
</html>
