<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colección de camisetas</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #062816;
        --bg-soft: #0d3d23;
        --card: #125632;
        --text: #eefaf2;
        --muted: #c9dfcf;
        --gold-soft: #f1deaa;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #052112 0%, var(--bg) 40%, #03150c 100%);
      }

      .app {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(8, 52, 28, 0.9);
        padding: 1.5rem 1rem;
      }

      .sidebar h1 {
        margin: 0 0 1.25rem;
        font-size: 1.15rem;
        color: var(--gold-soft);
      }

      .menu {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .menu-btn {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: var(--bg-soft);
        color: var(--text);
        border-radius: 0.65rem;
        padding: 0.75rem 0.85rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      .menu-btn.active {
        background: var(--card);
        border-color: rgba(241, 222, 170, 0.55);
      }

      .content {
        padding: 2rem;
      }

      .view {
        display: none;
        background: rgba(13, 61, 35, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        min-height: 260px;
        padding: 1.25rem;
      }

      .view.active { display: block; }

      .view h2 { margin-top: 0; color: var(--gold-soft); }
      .placeholder { color: var(--muted); }

      @media (max-width: 800px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.12); }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="Aplicación de colección de camisetas">
      <aside class="sidebar" aria-label="Menú lateral">
        <h1>Menú</h1>
        <nav class="menu" aria-label="Navegación principal">
          <button class="menu-btn active" data-view="camisetas">CAMISETAS</button>
          <button class="menu-btn" data-view="jugadores">JUGADORES</button>
          <button class="menu-btn" data-view="equipos">EQUIPOS</button>
          <button class="menu-btn" data-view="competencias">COMPETENCIAS</button>
        </nav>
      </aside>

      <section class="content" aria-live="polite">
        <article id="camisetas" class="view active">
          <h2>CAMISETAS</h2>
          <p class="placeholder">Pantalla vacía por ahora.</p>
        </article>

        <article id="jugadores" class="view">
          <h2>JUGADORES</h2>
          <p class="placeholder">Pantalla vacía por ahora.</p>
        </article>

        <article id="equipos" class="view">
          <h2>EQUIPOS</h2>
          <p class="placeholder">Pantalla vacía por ahora.</p>
        </article>

        <article id="competencias" class="view">
          <h2>COMPETENCIAS</h2>
          <p class="placeholder">Pantalla vacía por ahora.</p>
        </article>
      </section>
    </main>

    <script>
      const menuButtons = document.querySelectorAll('.menu-btn');
      const views = document.querySelectorAll('.view');

      menuButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const target = button.dataset.view;

          menuButtons.forEach((item) => item.classList.remove('active'));
          button.classList.add('active');

          views.forEach((view) => {
            view.classList.toggle('active', view.id === target);
          });
        });
      });
    </script>
  </body>
</html>
