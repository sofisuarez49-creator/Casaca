<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #fff;
      }

      .app {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        background: #000;
        color: #fff;
        padding: 1.5rem 1rem;
      }

      .menu {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .menu button {
        border: 1px solid #444;
        background: #111;
        color: #fff;
        padding: 0.7rem 0.8rem;
        text-align: left;
        cursor: pointer;
      }

      .menu button.active {
        background: #fff;
        color: #000;
      }

      .content {
        padding: 2rem;
        background: #fff;
      }

      .view { display: none; }
      .view.active { display: block; }

      .game-frame {
        width: 100%;
        min-height: 72vh;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      @media (max-width: 700px) {
        .app { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar" aria-label="Menú lateral">
        <nav class="menu">
          <button class="tab active" data-view="principal">Principal</button>
          <button class="tab" data-view="mapa">Mapa</button>
          <button class="tab" data-view="personajes">Personajes</button>
          <button class="tab" data-view="historia">Historia</button>
        </nav>
      </aside>

      <section class="content" aria-live="polite">
        <article id="principal" class="view active">
          <h1>Principal</h1>
          <iframe class="game-frame" src="principal.html" title="Juego Principal"></iframe>
        </article>

        <article id="mapa" class="view">
          <h1>Mapa</h1>
        </article>

        <article id="personajes" class="view">
          <h1>Personajes</h1>
        </article>

        <article id="historia" class="view">
          <h1>Historia</h1>
        </article>
      </section>
    </main>

    <script>
      const tabs = document.querySelectorAll('.tab');
      const views = document.querySelectorAll('.view');

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          const target = tab.dataset.view;

          tabs.forEach((button) => button.classList.remove('active'));
          views.forEach((view) => view.classList.remove('active'));

          tab.classList.add('active');
          document.getElementById(target).classList.add('active');
        });
      });
    </script>
  </body>
</html>
