<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casacas</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #0b1020;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
      .shirt-card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 14px;
        padding: 1rem;
      }
      .shirt-card h3 { margin: 0 0 0.25rem; }
      .shirt-events { margin: 0.75rem 0; padding-left: 1rem; }
      button, input {
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 10px;
        background: rgba(255,255,255,0.12);
        color: #fff;
        padding: 0.45rem 0.65rem;
      }
      .inline-form { margin-top: 0.65rem; display: flex; flex-direction: column; gap: 0.45rem; }
      .actions { display: flex; gap: 0.45rem; }
      .error { color: #ff8f8f; min-height: 1.1em; margin: 0; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Camisetas</h1>
      <div id="shirts-list" class="grid" aria-live="polite"></div>
    </main>

    <script>
      const schema = {
        shirts: [
          { id: "shirt-1", season: "2023/24", player: "Messi", extraEventIds: ["event-1"] },
          { id: "shirt-2", season: "2008/09", player: "Iniesta", extraEventIds: [] },
        ],
        events: [{ id: "event-1", name: "Debut en final" }],
      };

      const uiStateByShirt = {};
      const shirtsList = document.getElementById("shirts-list");

      const createUniqueEventId = () => {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          return `event-${crypto.randomUUID()}`;
        }
        return `event-${Date.now()}-${Math.floor(Math.random() * 1_000_000)}`;
      };

      const getEventsForShirt = (shirt) =>
        shirt.extraEventIds
          .map((eventId) => schema.events.find((event) => event.id === eventId))
          .filter(Boolean);

      const renderShirtCard = (shirtId) => {
        const shirt = schema.shirts.find((item) => item.id === shirtId);
        if (!shirt) return;

        const state = uiStateByShirt[shirt.id] ?? { formOpen: false, error: "" };
        uiStateByShirt[shirt.id] = state;

        const currentCard = shirtsList.querySelector(`[data-shirt-id="${shirt.id}"]`);
        const card = document.createElement("article");
        card.className = "shirt-card";
        card.dataset.shirtId = shirt.id;

        const events = getEventsForShirt(shirt);
        card.innerHTML = `
          <h3>${shirt.player}</h3>
          <p>Temporada: ${shirt.season}</p>
          <strong>Acontecimientos</strong>
          <ul class="shirt-events">
            ${events.length ? events.map((event) => `<li>${event.name}</li>`).join("") : "<li>Sin acontecimientos</li>"}
          </ul>
          <button type="button" data-action="open-form">Añadir acontecimiento</button>
          ${state.formOpen
            ? `<form class="inline-form" data-action="add-event-form">
                <input name="eventName" type="text" placeholder="Nombre del acontecimiento" autocomplete="off" />
                <div class="actions">
                  <button type="submit">Guardar</button>
                  <button type="button" data-action="cancel-form">Cancelar</button>
                </div>
                <p class="error">${state.error || ""}</p>
              </form>`
            : ""}
        `;

        if (currentCard) {
          currentCard.replaceWith(card);
        } else {
          shirtsList.appendChild(card);
        }
      };

      const renderAllShirts = () => {
        shirtsList.innerHTML = "";
        schema.shirts.forEach((shirt) => renderShirtCard(shirt.id));
      };

      shirtsList.addEventListener("click", (event) => {
        const card = event.target.closest(".shirt-card");
        if (!card) return;

        const shirtId = card.dataset.shirtId;
        const state = uiStateByShirt[shirtId] ?? { formOpen: false, error: "" };
        uiStateByShirt[shirtId] = state;

        const action = event.target.dataset.action;
        if (action === "open-form") {
          state.formOpen = true;
          state.error = "";
          renderShirtCard(shirtId);
        }

        if (action === "cancel-form") {
          state.formOpen = false;
          state.error = "";
          renderShirtCard(shirtId);
        }
      });

      shirtsList.addEventListener("submit", (event) => {
        event.preventDefault();
        const form = event.target;
        if (form.dataset.action !== "add-event-form") return;

        const card = form.closest(".shirt-card");
        const shirtId = card.dataset.shirtId;
        const shirt = schema.shirts.find((item) => item.id === shirtId);
        const state = uiStateByShirt[shirtId];
        const rawName = form.eventName.value;
        const eventName = rawName.trim();

        if (!eventName) {
          state.error = "El nombre es obligatorio.";
          renderShirtCard(shirtId);
          return;
        }

        const duplicate = getEventsForShirt(shirt)
          .some((shirtEvent) => shirtEvent.name.toLowerCase() === eventName.toLowerCase());

        if (duplicate) {
          state.error = "Este acontecimiento ya existe para esta camiseta.";
          renderShirtCard(shirtId);
          return;
        }

        const newEvent = { id: createUniqueEventId(), name: eventName };
        schema.events.push(newEvent);
        shirt.extraEventIds.push(newEvent.id);

        state.formOpen = false;
        state.error = "";
        renderShirtCard(shirtId);
      });

      renderAllShirts();
    </script>
  </body>
</html>
